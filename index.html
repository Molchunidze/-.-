<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Теплосбережение - Курьер</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_API_KEY&lang=ru_RU" type="text/javascript"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <header class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#9ec827] rounded flex items-center justify-center text-white font-bold text-xl shadow-inner">
                Т
            </div>
            <h1 class="font-bold text-gray-800 text-lg leading-tight uppercase tracking-wide">
                Теплосбережение<br><span class="text-[#9ec827] text-xs font-bold tracking-widest">ДОСТАВКА</span>
            </h1>
        </div>
        <button class="text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        </button>
    </header>

    <nav class="flex justify-around bg-white px-2 pt-3 shadow-sm mb-5 border-b border-gray-200">
        <button class="text-[#9ec827] font-bold border-b-4 border-[#9ec827] pb-2 px-2">Заказы</button>
        <button class="text-gray-400 font-semibold pb-2 px-2 hover:text-gray-600 transition">Смены</button>
        <button class="text-gray-400 font-semibold pb-2 px-2 hover:text-gray-600 transition">Календарь</button>
    </nav>

    <main class="px-4 pb-8 flex flex-col gap-5">
        
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="border-b border-gray-100 p-4 pb-3 flex justify-between items-center bg-gray-50">
                <span class="bg-gray-200 text-gray-700 text-xs font-bold px-3 py-1 rounded-sm tracking-wide">14:00 - 16:00</span>
                <span class="text-sm text-gray-500 font-medium">12 Марта</span>
            </div>
            
            <div class="p-4">
                <h2 class="text-lg font-bold text-gray-800 mb-1">г. Москва, ул. Ленина, д. 45, кв. 12</h2>
                
                <div class="flex items-center gap-2 text-sm text-[#9ec827] font-medium mb-4" id="metro-info-1">
                    <span>🚇 Загрузка метро...</span>
                </div>

                <div class="bg-gray-50 border border-gray-100 p-3 rounded mb-4 text-sm text-gray-600">
                    <div class="flex justify-between mb-1">
                        <span class="font-semibold text-gray-700">Иван Иванов</span>
                        <a href="tel:+79991234567" class="text-[#9ec827] font-bold hover:underline">+7 (999) 123-45-67</a>
                    </div>
                    <div class="border-t border-gray-200 my-2"></div>
                    <p><span class="font-semibold text-gray-700">Груз:</span> Терморегулятор (2 шт), Греющий кабель (15м)</p>
                </div>

                <div id="map-1" class="w-full h-32 bg-gray-200 rounded mb-4 border border-gray-200"></div>

                <div class="flex gap-3">
                    <button class="flex-1 bg-white border-2 border-[#9ec827] text-[#9ec827] hover:bg-[#9ec827] hover:text-white font-bold py-2.5 rounded transition" onclick="alert('Успешно')">
                        Вручено
                    </button>
                    <button class="bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold py-2.5 px-4 rounded transition" onclick="alert('Отмена')">
                        Отказ
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        ymaps.ready(init);
        function init() {
            const address = "Москва, улица Ленина, 45";
            ymaps.geocode(address).then(function (res) {
                const coords = res.geoObjects.get(0).geometry.getCoordinates();
                const map = new ymaps.Map("map-1", { center: coords, zoom: 15, controls: [] });
                map.geoObjects.add(new ymaps.Placemark(coords, { preset: 'islands#greenDotIcon' }));
                ymaps.geocode(coords, { kind: 'metro', results: 1 }).then(function (mRes) {
                    const metro = mRes.geoObjects.get(0);
                    document.getElementById('metro-info-1').innerHTML = metro ? `🚇 ${metro.properties.get('name')}` : "Метро не найдено";
                });
            });
        }
    </script>
</body>
</html>
