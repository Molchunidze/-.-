<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Теплосбережение Доставка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=9b0b8d19-63e2-430d-946c-26070928d7a4&lang=ru_RU"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #F2F2F7; -webkit-tap-highlight-color: transparent; }
        .ios-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .hidden { display: none !important; }
        .tab-active { color: #9ec827; }
        .ios-card { background: white; border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        /* Стили для плиток-часов */
        .hour-chip { transition: all 0.2s ease; border: 1px solid #f3f4f6; }
        input:checked + .hour-chip { background-color: #9ec827; border-color: #9ec827; color: white; box-shadow: 0 4px 12px rgba(158, 200, 39, 0.3); }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center px-10 text-center">
        <div class="w-20 h-20 bg-[#9ec827] rounded-2xl mb-6 flex items-center justify-center text-white text-4xl font-bold shadow-xl">Т</div>
        <h1 class="text-2xl font-black mb-8 uppercase tracking-tighter text-gray-800">Теплосбережение</h1>
        <div class="w-full space-y-3">
            <input id="login-field" type="text" placeholder="Логин" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-[#9ec827]">
            <input id="pass-field" type="password" placeholder="Пароль" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-[#9ec827]">
            <button onclick="handleLogin()" class="w-full py-4 bg-[#9ec827] text-white font-bold rounded-xl shadow-lg active:scale-95 transition">ВОЙТИ</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="ios-blur sticky top-0 z-50 px-5 pt-12 pb-4 border-b border-gray-200 flex justify-between items-end">
            <div>
                <p id="date-now" class="text-[12px] font-bold text-gray-400 uppercase tracking-tight"></p>
                <h1 id="header-title" class="text-3xl font-extrabold tracking-tight text-black">Доставки</h1>
            </div>
            <button onclick="location.reload()" class="text-red-500 font-bold text-sm mb-1">Выход</button>
        </header>

        <main id="view-orders" class="p-4 space-y-4">
            <div id="orders-container" class="space-y-4">
                <p class="text-center text-gray-400 py-10">Загрузка...</p>
            </div>
        </main>

        <main id="view-shifts" class="hidden p-4">
            <div class="ios-card p-6">
                <h3 class="font-bold text-lg mb-4 text-gray-800">Выбор времени</h3>
                <input type="date" id="shift-date" class="w-full p-4 bg-gray-50 rounded-xl mb-6 outline-none border border-gray-100 font-semibold">
                
                <div class="grid grid-cols-3 gap-3" id="hours-grid"></div>
                
                <button onclick="saveHours()" class="w-full mt-8 py-4 bg-[#9ec827] text-white font-bold rounded-2xl shadow-lg active:scale-95 transition">
                    СОХРАНИТЬ ЧАСЫ
                </button>
            </div>
        </main>

        <nav class="ios-blur fixed bottom-0 left-0 right-0 h-20 border-t border-gray-200 flex justify-around items-start pt-2">
            <button onclick="showTab('orders', 'Доставки', this)" class="flex flex-col items-center gap-1 tab-active">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[10px] font-bold uppercase">Заказы</span>
            </button>
            <button onclick="showTab('shifts', 'Мои часы', this)" class="flex flex-col items-center gap-1 text-gray-400">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-[10px] font-bold uppercase">Смены</span>
            </button>
        </nav>
    </div>

    <script>
        const SB_URL = 'https://qwhqlwqdlatajzsjdzyu.supabase.co';
        const SB_KEY = 'sb_publishable_8RVMnfTZ6iGC4ob2RS0X7Q_c9o0PzNY';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const hours = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];

        function handleLogin() {
            const l = document.getElementById('login-field').value.trim().toLowerCase();
            const p = document.getElementById('pass-field').value.trim();
            if(l === 'курьер' && p === '123') {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                initHours();
                loadOrders();
            } else { alert('Ошибка входа'); }
        }

        function initHours() {
            document.getElementById('hours-grid').innerHTML = hours.map(h => `
                <label class="cursor-pointer">
                    <input type="checkbox" value="${h}" class="hidden peer">
                    <div class="hour-chip p-3 text-center rounded-xl bg-gray-50 text-sm font-bold text-gray-500 peer-checked:bg-[#9ec827] peer-checked:text-white">${h}</div>
                </label>
            `).join('');
        }

        function showTab(id, title, btn) {
            document.getElementById('view-orders').classList.toggle('hidden', id !== 'orders');
            document.getElementById('view-shifts').classList.toggle('hidden', id !== 'shifts');
            document.getElementById('header-title').innerText = title;
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('tab-active', 'text-gray-400'));
            btn.classList.add('tab-active');
            btn.classList.remove('text-gray-400');
        }

        async function loadOrders() {
            const { data } = await supabaseClient.from('deliveries').select('*');
            const container = document.getElementById('orders-container');
            if(!data || data.length === 0) { container.innerHTML = "<p class='text-center text-gray-400 py-10'>Заказов нет</p>"; return; }

            container.innerHTML = data.map(item => `
                <div class="ios-card p-4">
                    <div class="flex justify-between mb-2"><span class="text-[10px] font-black text-[#9ec827] uppercase italic">ID ${item.id}</span></div>
                    <h2 class="text-xl font-bold mb-1 text-gray-800">${item.address}</h2>
                    <p class="text-sm text-gray-500 mb-4">${item.client_name} • ${item.items}</p>
                    <div id="map-${item.id}" class="w-full h-40 bg-gray-100 rounded-2xl mb-4 overflow-hidden shadow-inner"></div>
                    <button onclick="alert('Доставка подтверждена')" class="w-full py-4 bg-[#9ec827] text-white font-bold rounded-2xl shadow-lg active:scale-95 transition">ДОСТАВЛЕНО</button>
                </div>
            `).join('');

            data.forEach(item => {
                ymaps.ready(() => {
                    const map = new ymaps.Map(`map-${item.id}`, { center: [55.75, 37.61], zoom: 14, controls: [] });
                    ymaps.geocode(item.address).then(res => {
                        const coords = res.geoObjects.get(0).geometry.getCoordinates();
                        map.setCenter(coords);
                        map.geoObjects.add(new ymaps.Placemark(coords, {}, { preset: 'islands#greenDotIcon' }));
                    });
                });
            });
        }

        function saveHours() { alert('Смена сохранена в базе данных'); }
        document.getElementById('date-now').innerText = new Date().toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
    </script>
</body>
</html>
