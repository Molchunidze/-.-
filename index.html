<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CRM PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:#f5f6fa }
.card { background:white; padding:16px; border-radius:12px; margin-bottom:10px }
.input { padding:10px; border:1px solid #ddd; border-radius:8px; width:100% }
.btn { padding:10px; background:#9ec827; color:white; border-radius:8px; width:100% }
</style>
</head>

<body class="p-6">

<div id="auth">
    <input id="login" placeholder="логин" class="input mb-2">
    <input id="pass" type="password" placeholder="пароль" class="input mb-2">
    <button onclick="loginUser()" class="btn">Войти</button>
</div>

<div id="app" class="hidden">

    <div class="flex justify-between mb-4">
        <h2 class="text-xl font-bold">Заказы</h2>
        <select id="filter" onchange="loadOrders()" class="input w-40">
            <option value="all">Все</option>
            <option value="new">Новые</option>
            <option value="done">Выполненные</option>
        </select>
    </div>

    <div id="orders"></div>

    <hr class="my-6">

    <h3 class="font-bold mb-2">Создать заказ</h3>

    <input id="addr" placeholder="адрес" class="input mb-2">
    <input id="name" placeholder="имя" class="input mb-2">
    <input id="phone" placeholder="телефон" class="input mb-2">
    <input id="date" type="date" class="input mb-2">
    <input id="time" type="time" class="input mb-2">

    <button onclick="createOrder()" class="btn">Сохранить</button>

</div>

<script>
const supabaseClient = supabase.createClient(
    'https://qwhqlwqdlatajzsjdzyu.supabase.co',
    'sb_publishable_8RVMnfTZ6iGC4ob2RS0X7Q_c9o0PzNY'
);

let user = null;

// ---------------- LOGIN ----------------
async function loginUser() {
    const l = login.value.trim();
    const p = pass.value.trim();

    const { data, error } = await supabaseClient
        .from('employees')
        .select('*')
        .eq('login', l)
        .eq('password', p)
        .maybeSingle();

    console.log("LOGIN:", data, error);

    if (error || !data) {
        alert("Ошибка входа");
        return;
    }

    user = data;
    auth.classList.add('hidden');
    app.classList.remove('hidden');

    loadOrders();
    subscribeRealtime();
}

// ---------------- LOAD ----------------
async function loadOrders() {

    let query = supabaseClient
        .from('deliveries')
        .select('*')
        .order('delivery_date', { ascending:false });

    if (filter.value === 'new') {
        query = query.eq('status', 'new');
    }

    if (filter.value === 'done') {
        query = query.eq('status', 'done');
    }

    const { data, error } = await query;

    console.log("LOAD:", data, error);

    if (error) {
        alert(error.message);
        return;
    }

    renderOrders(data);
}

// ---------------- RENDER ----------------
function renderOrders(data) {
    orders.innerHTML = (data || []).map(o => `
        <div class="card">
            <b>${o.address}</b><br>
            ${o.delivery_date} ${o.delivery_time}<br>
            ${o.client_name || ''}<br>

            <div class="flex gap-2 mt-2">
                <button onclick="setStatus('${o.id}','done')" class="btn">✔</button>
                <button onclick="deleteOrder('${o.id}')" class="bg-red-400 text-white px-2 rounded">✖</button>
            </div>
        </div>
    `).join('') || 'Нет заказов';
}

// ---------------- CREATE ----------------
async function createOrder() {

    const data = {
        address: addr.value.trim(),
        client_name: name.value.trim(),
        client_phone: phone.value.trim(),
        delivery_date: date.value,
        delivery_time: time.value,
        status: 'new'
    };

    if (!data.address || !data.delivery_date || !data.delivery_time) {
        alert("Заполни обязательные поля");
        return;
    }

    const { data: res, error } = await supabaseClient
        .from('deliveries')
        .insert([data])
        .select();

    console.log("INSERT:", res, error);

    if (error) {
        alert(error.message);
        return;
    }

    addr.value = '';
    name.value = '';
    phone.value = '';
    date.value = '';
    time.value = '';
}

// ---------------- STATUS ----------------
async function setStatus(id, status) {
    const { error } = await supabaseClient
        .from('deliveries')
        .update({ status })
        .eq('id', id);

    console.log("STATUS:", error);
}

// ---------------- DELETE ----------------
async function deleteOrder(id) {
    if (!confirm("Удалить?")) return;

    const { error } = await supabaseClient
        .from('deliveries')
        .delete()
        .eq('id', id);

    console.log("DELETE:", error);
}

// ---------------- REALTIME ----------------
function subscribeRealtime() {
    supabaseClient
        .channel('orders')
        .on('postgres_changes',
            { event: '*', schema: 'public', table: 'deliveries' },
            () => loadOrders()
        )
        .subscribe();
}
</script>

</body>
</html>
