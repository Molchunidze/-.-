<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Теплосбережение Доставка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #F2F2F7; }
        .ios-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .hidden { display: none; }
        .tab-active { color: #9ec827; }
        .ios-card { background: white; border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center px-10">
        <div class="w-20 h-20 bg-[#9ec827] rounded-2xl mb-6 flex items-center justify-center text-white text-4xl font-bold shadow-xl">Т</div>
        <h1 class="text-2xl font-bold text-center mb-8 uppercase tracking-tight">Теплосбережение</h1>
        <div class="w-full space-y-3">
            <input id="login" type="text" placeholder="Логин" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-[#9ec827]">
            <input id="pass" type="password" placeholder="Пароль" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-[#9ec827]">
            <button onclick="login()" class="w-full py-4 bg-[#9ec827] text-white font-bold rounded-xl shadow-lg active:scale-95 transition">ВОЙТИ</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="ios-blur sticky top-0 z-50 px-5 pt-12 pb-4 border-b border-gray-200 flex justify-between items-end">
            <div>
                <p id="date-now" class="text-[12px] font-bold text-gray-400 uppercase tracking-tight"></p>
                <h1 id="header-title" class="text-3xl font-extrabold tracking-tight text-black">Доставки</h1>
            </div>
            <button onclick="logout()" class="text-red-500 font-bold text-sm mb-1">Выйти</button>
        </header>

        <main id="view-orders" class="p-4 space-y-4">
            <div id="orders-container" class="space-y-4">
                </div>
        </main>

        <main id="view-shifts" class="hidden p-4">
            <div class="ios-card p-6 space-y-4">
                <h3 class="font-bold text-lg">Указать смену</h3>
                <input type="date" class="w-full p-3 bg-gray-50 rounded-lg">
                <select class="w-full p-3 bg-gray-50 rounded-lg">
                    <option>09:00 - 18:00</option>
                    <option>10:00 - 22:00</option>
                </select>
                <button onclick="alert('Смена сохранена')" class="w-full py-3 bg-[#9ec827] text-white font-bold rounded-xl">Сохранить</button>
            </div>
        </main>

        <nav class="ios-blur fixed bottom-0 left-0 right-0 h-20 border-t border-gray-200 flex justify-around items-start pt-2">
            <button onclick="showTab('orders', 'Доставки', this)" class="flex flex-col items-center gap-1 tab-active">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[10px] font-medium">Заказы</span>
            </button>
            <button onclick="showTab('shifts', 'Смены', this)" class="flex flex-col items-center gap-1 text-gray-400">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-[10px] font-medium">Мои смены</span>
            </button>
        </nav>
    </div>

    <script>
       const SUPABASE_URL = 'https://qwhqlwqdlatajzsjdzyu.supabase.co;
        const SUPABASE_KEY = 'sb_publishable_8RVMnfTZ6iGC4ob2RS0X7Q_c9o0PzNY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function login() {
            if(document.getElementById('login').value === 'курьер' && document.getElementById('pass').value === '123') {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                loadOrders();
            } else { alert('Ошибка входа'); }
        }

        function logout() { location.reload(); }

        function showTab(id, title, btn) {
            document.getElementById('view-orders').classList.toggle('hidden', id !== 'orders');
            document.getElementById('view-shifts').classList.toggle('hidden', id !== 'shifts');
            document.getElementById('header-title').innerText = title;
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('tab-active', 'text-gray-400'));
            btn.classList.replace('text-gray-400', 'tab-active');
        }

        async function loadOrders() {
            const { data } = await supabaseClient.from('deliveries').select('*');
            const container = document.getElementById('orders-container');
            container.innerHTML = data.map(item => `
                <div class="ios-card p-4">
                    <div class="flex justify-between mb-2"><span class="text-[10px] font-bold text-[#9ec827] uppercase">ID ${item.id}</span></div>
                    <h2 class="text-xl font-bold mb-1">${item.address}</h2>
                    <p class="text-sm text-gray-500 mb-4">${item.client_name} • ${item.items}</p>
                    <button class="w-full py-3 bg-[#9ec827] text-white font-bold rounded-xl shadow-lg">ДОСТАВЛЕНО</button>
                </div>
            `).join('');
        }

        document.getElementById('date-now').innerText = new Date().toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
    </script>
</body>
</html>
