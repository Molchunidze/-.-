<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Теплосбережение</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #F2F2F7; }
        .ios-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .hidden { display: none; }
        .active-tab { color: #9ec827; }
        .tab-content { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center px-10">
        <div class="w-20 h-20 bg-[#9ec827] rounded-2xl mb-6 shadow-xl flex items-center justify-center text-white text-4xl font-bold">Т</div>
        <h1 class="text-2xl font-bold mb-8 text-center text-gray-800 uppercase tracking-tight">Теплосбережение<br><span class="text-[#9ec827]">Доставка</span></h1>
        
        <div class="w-full space-y-3">
            <input id="login-input" type="text" placeholder="Логин" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-[#9ec827]">
            <input id="pass-input" type="password" placeholder="Пароль" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-[#9ec827]">
            <button onclick="handleLogin()" class="w-full py-4 bg-[#9ec827] text-white font-bold rounded-xl shadow-lg active:scale-95 transition">ВОЙТИ</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        
        <header class="ios-blur sticky top-0 z-50 px-5 pt-12 pb-4 border-b border-gray-200 flex justify-between items-end">
            <div>
                <p id="current-date" class="text-[13px] font-semibold text-gray-400 uppercase tracking-tight"></p>
                <h1 id="page-title" class="text-3xl font-extrabold tracking-tight text-black">Доставки</h1>
            </div>
            <button onclick="handleLogout()" class="text-red-500 text-sm font-bold mb-1">Выход</button>
        </header>

        <main id="tab-deliveries" class="tab-content px-4 pt-6 space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                <p class="text-gray-400">У вас пока нет активных доставок из Битрикс24</p>
            </div>
        </main>

        <main id="tab-shifts" class="tab-content hidden px-4 pt-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                <h3 class="font-bold text-lg">Выставить смену</h3>
                <div>
                    <label class="text-xs text-gray-400 uppercase font-bold">Выберите день</label>
                    <input type="date" class="w-full p-3 bg-gray-50 rounded-lg mt-1 border-none outline-none">
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase font-bold">Время</label>
                    <select class="w-full p-3 bg-gray-50 rounded-lg mt-1 border-none outline-none">
                        <option>09:00 - 18:00</option>
                        <option>10:00 - 22:00</option>
                        <option>Свой вариант</option>
                    </select>
                </div>
                <button onclick="alert('Смена сохранена!')" class="w-full py-3 bg-[#9ec827] text-white font-bold rounded-xl">Сохранить</button>
            </div>
        </main>

        <main id="tab-calendar" class="tab-content hidden px-4 pt-6 text-center">
            <div class="bg-white p-8 rounded-2xl shadow-sm">
                <p class="text-gray-400 italic">Здесь будет календарь смен всей команды Теплосбережения</p>
            </div>
        </main>

        <nav class="ios-blur fixed bottom-0 left-0 right-0 h-20 border-t border-gray-200 flex justify-around items-start pt-2 px-6">
            <button onclick="switchTab('deliveries', 'Доставки', this)" class="flex flex-col items-center gap-1 active-tab">
                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[10px] font-medium">Заказы</span>
            </button>
            <button onclick="switchTab('shifts', 'Мои смены', this)" class="flex flex-col items-center gap-1 text-gray-400">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-[10px] font-medium">Смены</span>
            </button>
            <button onclick="switchTab('calendar', 'Календарь', this)" class="flex flex-col items-center gap-1 text-gray-400">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                <span class="text-[10px] font-medium">Общий</span>
            </button>
        </nav>
    </div>

    <script>
        // ЛОГИКА АВТОРИЗАЦИИ
        function handleLogin() {
            const login = document.getElementById('login-input').value;
            const pass = document.getElementById('pass-input').value;

            // Простая проверка (в реальности нужно проверять в БД Supabase)
            if (login === 'курьер' && pass === '123') {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            } else {
                alert('Неверный логин или пароль! Попробуйте курьер / 123');
            }
        }

        function handleLogout() {
            if(confirm('Выйти из приложения?')) {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        }

        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        function switchTab(tabId, title, btn) {
            // Скрыть все вкладки
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            // Сбросить цвет всех иконок
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-[#9ec827]'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-gray-400'));

            // Показать нужную вкладку
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('page-title').innerText = title;
            
            // Подсветить кнопку
            btn.classList.add('active-tab', 'text-[#9ec827]');
            btn.classList.remove('text-gray-400');
        }

        // Дата
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ru-RU', options);
    </script>
</body>
</html>
