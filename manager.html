<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Теплосбережение | Менеджер</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F5F5F7; }
        .sidebar { background: rgba(232, 232, 237, 0.5); backdrop-filter: blur(20px); }
    </style>
</head>
<body id="body-content" class="flex h-screen overflow-hidden">

    <div id="manager-auth" class="fixed inset-0 z-[100] bg-[#F5F5F7] flex items-center justify-center">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 text-center">
            <div class="w-16 h-16 bg-[#9ec827] rounded-2xl mx-auto mb-6 flex items-center justify-center text-white font-bold text-2xl">Т</div>
            <h2 class="text-xl font-bold mb-6">Вход для менеджера</h2>
            <input id="m-login" type="text" placeholder="Логин" class="w-full p-3 bg-gray-100 rounded-lg mb-3 outline-none">
            <input id="m-pass" type="password" placeholder="Пароль" class="w-full p-3 bg-gray-100 rounded-lg mb-6 outline-none">
            <button onclick="managerLogin()" class="w-full py-3 bg-[#9ec827] text-white font-bold rounded-lg hover:shadow-lg transition">Войти в систему</button>
        </div>
    </div>

    <aside class="sidebar w-64 p-6 border-r border-gray-200 hidden" id="aside-menu">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-8 h-8 bg-[#9ec827] rounded-lg"></div>
            <h1 class="font-bold text-xs uppercase tracking-widest text-gray-500">Теплосбережение</h1>
        </div>
        <nav class="space-y-2">
            <button class="w-full text-left p-3 bg-white shadow-sm rounded-xl font-bold text-sm">📦 Доставки</button>
            <button class="w-full text-left p-3 text-gray-500 font-bold text-sm hover:bg-gray-200/50 rounded-xl">📅 Календарь смен</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col hidden" id="main-area">
        <header class="p-8 flex justify-between items-end">
            <h2 class="text-3xl font-bold tracking-tight">Управление доставками</h2>
            <button onclick="addNew()" class="bg-[#9ec827] text-white px-6 py-2 rounded-xl font-bold shadow-md">+ Добавить вручную</button>
        </header>

        <div class="px-8 flex-1 overflow-auto">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100">
                        <tr>
                            <th class="p-4">Адрес</th>
                            <th class="p-4">Клиент</th>
                            <th class="p-4">Товары</th>
                            <th class="p-4">Статус</th>
                        </tr>
                    </thead>
                    <tbody id="mgr-table-body" class="divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://qwhqlwqdlatajzsjdzyu.supabase.co;
        const SUPABASE_KEY = 'sb_publishable_8RVMnfTZ6iGC4ob2RS0X7Q_c9o0PzNY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function managerLogin() {
            if(document.getElementById('m-login').value === 'менеджер' && document.getElementById('m-pass').value === '123') {
                document.getElementById('manager-auth').classList.add('hidden');
                document.getElementById('aside-menu').classList.remove('hidden');
                document.getElementById('main-area').classList.remove('hidden');
                loadData();
            }
        }

        async function loadData() {
            const { data } = await supabaseClient.from('deliveries').select('*');
            document.getElementById('mgr-table-body').innerHTML = data.map(i => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-4 font-bold text-sm">${i.address}</td>
                    <td class="p-4 text-sm">${i.client_name}</td>
                    <td class="p-4 text-xs text-gray-500">${i.items}</td>
                    <td class="p-4"><span class="px-2 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded uppercase">${i.status}</span></td>
                </tr>
            `).join('');
        }

        async function addNew() {
            const address = prompt("Адрес:");
            const name = prompt("Имя клиента:");
            if(address && name) {
                await supabaseClient.from('deliveries').insert([{ address: address, client_name: name, items: 'Ручной ввод', status: 'pending' }]);
                loadData();
            }
        }
    </script>
</body>
</html>
